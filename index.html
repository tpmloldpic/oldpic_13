<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>臺北明治橋</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;
  font-weight:300;
  background:#000;
}

/* 背景 */
.hero{
  position: relative;
  min-height: 100vh;
  padding: 24px 16px 44px;

  background:
    radial-gradient(1200px 800px at 20% 10%, rgba(255,255,255,.12), rgba(0,0,0,0) 60%),
    linear-gradient(180deg, rgba(0,0,0,.22), rgba(0,0,0,.48)),
    url("images/bg.jpg");

  background-position:center;
  background-size:cover;
  background-repeat:no-repeat;
}

.hero-content{
  position:relative;
  max-width:900px;
  margin:0 auto;
  color:#fff;
}

/* 標題：白色 + 粗一點 */
.hero-title{
  text-align:center;
  font-size:34px;
  font-weight:600;
  margin:8px 0 18px;
  letter-spacing:.5px;
  color:#fff;
}

/* ✅ YouTube 影片外觀：跟你原本 video 一樣（滿寬/圓角/陰影） */
.yt-box{
  width:100%;
  border-radius:16px;
  overflow:hidden;
  background:#000;
  box-shadow:0 14px 40px rgba(0,0,0,.35);

  position:relative;
  padding-top:56.25%; /* 16:9 */
}

.yt-box iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:0;
}

/* 文字區：半透明玻璃感 */
.hero-text{
  margin-top:18px;
  font-size:20px;
  line-height:1.9;
  padding:18px;
  border-radius:16px;

  background:rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.16);
  box-shadow:0 12px 40px rgba(0,0,0,.35);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

/* 段落：統一不要粗 + 首行縮排 */
.hero-text p{
  text-indent:2em;
  margin:12px 0;
  font-weight:300;
}

@media(min-width:768px){
  .hero-title{font-size:44px;}
  .hero-text{font-size:22px;}
}
</style>
</head>

<body>

<div class="hero">
  <div class="hero-content">

    <h2 class="hero-title">臺北明治橋</h2>

    <!-- ✅ 這裡改成 embed 連結（已幫你填好 ID） -->
    <div class="yt-box">
      <iframe
        src="https://www.youtube.com/embed/091XLCrZ9UU"
        title="臺北明治橋影片"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen>
      </iframe>
    </div>

    <div class="hero-text">
      <p>1898年，臺灣總督兒玉源太郎與民政長官後藤新平剛上任，兩人希望在視野開闊的地方蓋神社。經過幾次勘查後，覺得劍潭山山勢高聳，能俯瞰整個臺北地區。於是先後在劍潭山蓋了第一和第二代臺灣神社，神社與臺北市區隔著基隆河俯首相望。</p>
      <p>為了興建日本皇族至臺灣參拜臺灣神社時所走的道路，也就是敕使街道，1901年，又於基隆河上建立第一代明治橋。</p>
      <p>直到1930年代，橋體老舊不堪，他們在下游處興建了第二代明治橋。稍微觀察就能發現第一代與第二代橋梁外觀非常不同：第一代帶有機械風格，第二代則呈現歐式風格。橋寬約17公尺，因此大型車輛與行人都能順利通行。</p>
    </div>

  </div>
</div>

</body>
</html>
